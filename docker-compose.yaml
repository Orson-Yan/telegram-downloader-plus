version: "3.8"

services:
  telegram_media_downloader:
    build: .
    image: mangoisillegal/telegram_media_downloader:latest
    container_name: telegram_media_downloader
    network_mode: bridge
    stdin_open: true
    tty: true
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
      - http_proxy=socks5://172.17.0.1:20170
      - https_proxy=socks5://172.17.0.1:20170
    volumes:
      # 下载目录 (修改为你的实际路径)
      - "/volume4/资料-10t:/app/downloads/"
      # 配置文件
      - "./config.yaml:/app/config.yaml"
      - "./data.yaml:/app/data.yaml"
      # 日志
      - "./log:/app/log/"
      # Telegram session
      - "./sessions:/app/sessions"
      # 临时文件
      - "./temp:/app/temp"
    restart: unless-stopped
